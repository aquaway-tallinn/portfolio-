<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Michelle Feldman — Aquaway Spordikool · Portfolio 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f3460;--gold:#F5B800;--blue:#4BA3D3;
  --darker:#050a15;--card:#0d1b35;--card2:#111f3a;
  --text:#e8eef7;--muted:#7a90b0;--border:rgba(75,163,211,0.15);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;overflow-x:hidden;}
body{font-family:'Barlow',sans-serif;background:var(--darker);color:var(--text);line-height:1.6;-webkit-text-size-adjust:100%;}

img{object-fit:contain!important;height:auto!important;width:100%;display:block;}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(5,10,21,0.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.65rem 5vw;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{width:110px;}.nav-logo img{max-width:110px;}
.nav-links{display:flex;gap:1.3rem;}
.nav-links a{font-size:0.64rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--gold);}
@media(max-width:500px){.nav-links{gap:0.7rem;}.nav-links a{font-size:0.55rem;}.hide-xs{display:none;}}

/* HERO */
.hero{width:100%;background:var(--navy);display:grid;grid-template-columns:1fr 1fr;align-items:center;border-bottom:3px solid var(--gold);}
.hero-left{padding:4rem 2.5rem 4rem 8vw;background:linear-gradient(135deg,rgba(5,10,21,0.95),rgba(15,52,96,0.85));}
.hero-right{padding:3rem 8vw 3rem 2rem;display:flex;flex-direction:column;align-items:center;background:linear-gradient(135deg,rgba(15,52,96,0.7),rgba(5,10,21,0.9));}
.hero-photo{width:100%;max-width:320px;border-radius:8px;overflow:hidden;border:2px solid rgba(245,184,0,0.3);margin-bottom:1.25rem;}
.hero-photo img{max-width:320px;}
.hero-tag{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;font-weight:600;letter-spacing:0.35em;text-transform:uppercase;color:var(--blue);margin-bottom:0.7rem;display:flex;align-items:center;gap:0.6rem;}
.hero-tag::before{content:'';display:block;width:1.5rem;height:2px;background:var(--blue);}
.hero-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;line-height:0.88;margin-bottom:1.5rem;}
.hero-name .first{font-size:clamp(2.5rem,5vw,5rem);color:#fff;display:block;}
.hero-name .last{font-size:clamp(3.5rem,7.5vw,7.5rem);color:var(--gold);display:block;}
.hero-meta{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem 2rem;margin-bottom:2rem;}
.meta-label{font-size:0.57rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
.meta-value{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:700;color:#fff;}
.hero-pbs{width:100%;display:flex;flex-direction:column;gap:0.55rem;}
.hpb{background:rgba(5,10,21,0.7);border:1px solid rgba(75,163,211,0.2);border-left:3px solid var(--blue);border-radius:4px;padding:0.72rem 1rem;display:flex;justify-content:space-between;align-items:center;}
.hpb.gold{border-left-color:var(--gold);border-color:rgba(245,184,0,0.22);}
.hpb-label{font-size:0.57rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.1rem;}
.hpb-time{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;color:var(--gold);line-height:1;}
.hpb-right{text-align:right;}
.hpb-pts{font-size:0.68rem;color:var(--blue);font-weight:600;}
.hpb-date{font-size:0.58rem;color:var(--muted);}
@media(max-width:750px){.hero{grid-template-columns:1fr;}.hero-left{padding:2.5rem 5vw 1.5rem;}.hero-right{padding:1.5rem 5vw 2.5rem;align-items:flex-start;}.hero-photo{max-width:200px;}.hero-photo img{max-width:200px;}}

/* STATS */
.stats-band{background:var(--navy);border-top:3px solid var(--gold);display:grid;grid-template-columns:repeat(4,1fr);}
.stat-item{padding:1.3rem 0.5rem;text-align:center;border-right:1px solid rgba(255,255,255,0.07);}
.stat-item:last-child{border-right:none;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:2.1rem;font-weight:900;color:var(--gold);line-height:1;}
.stat-lbl{font-size:0.53rem;letter-spacing:0.09em;text-transform:uppercase;color:var(--muted);margin-top:0.2rem;}
@media(max-width:500px){.stats-band{grid-template-columns:repeat(2,1fr);}.stat-item:nth-child(2){border-right:none;}.stat-item{border-bottom:1px solid rgba(255,255,255,0.07);}}

/* SECTIONS */
.section{padding:3.5rem 5vw;width:100%;}
.section-alt{background:var(--card);}
.sec-label{font-size:0.62rem;letter-spacing:0.26em;text-transform:uppercase;color:var(--blue);margin-bottom:0.35rem;display:flex;align-items:center;gap:0.5rem;}
.sec-label::before{content:'';display:block;width:1.25rem;height:2px;background:var(--blue);}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:800;text-transform:uppercase;color:#fff;line-height:1;margin-bottom:1.75rem;}

/* HIGHLIGHT */
.highlight-box{background:linear-gradient(135deg,rgba(15,52,96,0.5),rgba(75,163,211,0.07));border:1px solid rgba(75,163,211,0.2);border-left:4px solid var(--gold);border-radius:6px;padding:1.2rem 1.4rem;margin-top:1.5rem;}
.hl-label{font-size:0.6rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.2rem;}
.hl-sub{font-size:0.8rem;color:rgba(255,255,255,0.75);margin-bottom:1rem;line-height:1.5;}
.hl-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:0.45rem;}
@media(max-width:600px){.hl-cards{grid-template-columns:repeat(3,1fr);}}
.hl-card{background:rgba(5,10,21,0.55);border:1px solid rgba(245,184,0,0.2);border-radius:4px;padding:0.55rem 0.4rem;text-align:center;}
.hl-ev{font-size:0.52rem;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:0.12rem;}
.hl-t{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:800;color:var(--gold);line-height:1;}
.hl-p{font-size:0.6rem;color:var(--blue);font-weight:600;margin-top:0.1rem;}

/* NEW RESULT BOX */
.new-result-box{
background:linear-gradient(135deg,rgba(245,184,0,0.08),rgba(15,52,96,0.5));
border:1px solid rgba(245,184,0,0.35);
border-left:4px solid var(--gold);
border-radius:6px;padding:1.3rem 1.5rem;
margin-bottom:2rem;
position:relative;
}
.new-badge{
display:inline-block;
background:var(--gold);color:var(--darker);
font-size:0.55rem;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;
padding:0.18rem 0.5rem;border-radius:2px;
margin-bottom:0.5rem;
}
.new-result-title{font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;font-weight:700;color:#fff;margin-bottom:0.75rem;}
.new-result-cards{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
@media(max-width:500px){.new-result-cards{grid-template-columns:1fr;}}
.nrc{background:rgba(5,10,21,0.6);border:1px solid rgba(245,184,0,0.25);border-radius:5px;padding:0.8rem 1rem;display:flex;justify-content:space-between;align-items:center;}
.nrc-left{}
.nrc-place{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.1rem;}
.nrc-event{font-size:0.78rem;font-weight:600;color:#fff;margin-bottom:0.2rem;}
.nrc-time{font-family:'Barlow Condensed',sans-serif;font-size:1.7rem;font-weight:900;color:var(--gold);line-height:1;}
.nrc-right{text-align:right;}
.nrc-pts{font-size:0.85rem;color:var(--blue);font-weight:700;}
.nrc-pts-label{font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.nrc-medal{font-size:1.4rem;margin-bottom:0.2rem;}
